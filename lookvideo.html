<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>观看视频页面-好看视频大赏</title>
    <link rel="stylesheet" href="ui/newui.css">
    <style>
        #myVideo{
            background-color: black;
            display: block;
            box-shadow: 0px 20px 20px rgba(0, 0, 0, 0.1),
                -4px -4px 12px rgba(0, 0, 0, 0.08);
            width: 100%;
            height: 100%;
            min-width: 194px;
            margin: 0;
            margin-left: 99px;
        }
        #videoTitle{
            font-size: 50px;
            text-align: center;
            color: #f1f1f1;
            margin: 0;
            margin-top: 5px;
        }
        .btn{
            cursor: pointer;
            max-width: 200px;
            width: auto;
            min-width: 180px;
            background-color: white;
            box-shadow: 0px 20px 20px rgba(0, 0, 0, 0.1),
            -4px -4px 12px rgba(0, 0, 0, 0.08);
            margin: 0px 5px 5px 5px;
            border-radius: 20px;
            height: 82px;
            line-height: 82px;
            font-size: 30px;
            text-align: center;
            transition: all 0.3s;
        }
        .btn:hover{
            transform: translateY(-10px);
        }
        #subtitle-container{
            position: absolute;
            bottom: 20vh;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            max-width: 70%;
            word-wrap: break-word;
            text-align: center;
            font-size: 35px;
            color: white;
            background: rgba(0, 0, 0,0.8);
            padding: 10px;
            box-sizing: border-box;
            pointer-events: none; /* 确保字幕不干扰视频的控制操作 */
            border-radius: 10px;
            margin-left: 48.5px;
            opacity: 1;
        }
        .vvv{
            width: calc(99vw - 114px);
            height: 93vh;
            overflow-x: visible;
        }
        .zhuyao{
            background: #3c3c3c;
            margin: 0;
            padding-top: 0px;
            border-radius: 0;
        }
        .viewmore{
            margin: 0;
            font-size: 4vh;
            text-align: center;
            margin-bottom: 1vh;
        }
        #tips{
            font-size: 30px;
            color: azure;
        }
        body{
            background:linear-gradient(to bottom,black,#3c3c3c);
        }
    </style>
</head>
<body>
    <header oncontextmenu=self.event.returnValue=false>
        <img class="bg" id="bizhi">
        <div class="vvv" id="vvv">
            <video autoplay="autoplay" id="myVideo" controls>
                <p>你的浏览器不支持html5视频播放器，<a href="https://www.google.cn/chrome">点我下载谷歌浏览器，保真！</a></p>
                <p>Your browser doesn't support HTML5 video player.<a href="https://www.chrome.com">Click me to download Google Chrome to ensure that it is true!</a></p>
            </video>
            <div id="subtitle-container">这里将会显示这条视频的字幕。</div>
        </div>
    </header>
    <div class="wrapper">
        <div class="bar" id="bar">
            <!-- 已选中 -->
            <!--<div class="barbutton" title="🏠首页" style="background: black;">
                <p class="barbuttontext" style="color: white;">🏠</br>首页</p>
            </div>-->
            <p class="haovideologo" title="好看视频大赏-Haovideo" onclick="about()">好看视频大赏</p>
            <div class="barbutton" title="🏠首页" onclick="window.location.href='index.html'">
                <p class="barbuttonemoji">🏠</p>
                <br>
                <p class="barbuttontext">首页</p>
            </div>
            <div class="barbutton" title="🗂分类" onclick="window.location.href='tags.html'">
                <p class="barbuttonemoji">🗂</p>
                <br>
                <p class="barbuttontext">分类</p>
            </div>
            <div class="barbutton" title="🧐帮助" onclick="help()">
                <p class="barbuttonemoji">🧐</p>
                <br>
                <p class="barbuttontext">帮助</p>
            </div>
            <div class="barbutton" title="👨‍💻源码" onclick="window.open('https://github.com/modiange/modiange.github.io')">
                <p class="barbuttonemoji">👨‍💻</p>
                <br>
                <p class="barbuttontext">源码</p>
            </div>
            <div class="barbutton" title="🌅壁纸" onclick="laiyuan()" id="bzan">
                <p class="barbuttonemoji" id="logobizhi">🌅</p>
                <br>
                <p class="barbuttontext">壁纸</p>
            </div>
        </div>
        <div style="margin-right: 99px;" id="aking"></div>
        <div class="zhuyao"> 
            <noscript>
                <p id="nojs">你的浏览器不支持JavaScript，<a href="https://www.google.cn/chrome">点我下载谷歌浏览器，保真！</a></p>
            </noscript>  
            <p class="good" id="good" style="color: #3c3c3c;"></p>
            <div class="container" style="margin: 0;">
                <svg viewBox="0 0 512 512" style="transform: rotate(180deg);height:5vh;margin:0;" xmlns="http://www.w3.org/2000/svg" id="viewmorelogo"><path d="M233.4 406.6c12.5 12.5 32.8 12.5 45.3 0l192-192c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L256 338.7 86.6 169.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l192 192z"></path></svg>
                <p class="viewmore" id="vm">查看更多内容</p>
            </div>
            <div id="no-results" class="no-results" style="display: block; margin-top: 50px;"></div>
            <div class="container" style="background-color: #1f2020;border-radius: 10px;" id="morething">
                <h1 id="videoTitle">标题</h1>
                <p id="tips">↑键音量加10%，↓键音量减10%，←键退后5秒，→键快进10秒。</p> <!-- 新增：显示视频标题 --> 
            </div>
            <div style="display: flex;flex-wrap: wrap;gap: 3%;justify-content: center;">
                <div class="container">
                    <div style="background-color: #1f2020;padding: 10px;border-radius: 10px;">
                        <div class="container">
                            <div class="btn" id="subb" onclick="opcosu()" title="字幕开关" style="-webkit-user-select: none;-moz-user-select: none;-ms-user-select: none;user-select: none;">✅字幕</div>
                            <div class="btn" onclick="xunhuan()" title="精彩片段" id="xh">❎循环播放</div>
                            <div class="btn" onclick="bars()" title="精彩片段" id="showbar">✅边栏</div>
                            <div class="btn" id="draw" style="width: 600px;max-width: 600px;">字幕位置<input type="range" min="15" max="85" step="5" id="smap" onchange="sumap()" value="20"></div>
                        </div>
                        <div class="container">
                            <div class="btn" onclick="skip()" title="精彩片段">精彩片段</div>
                            <div class="btn" onclick="shoucang()" title="收藏视频">收藏视频</div>
                            <div class="btn" onclick="share()" title="分享视频">分享视频</div>
                            <div class="btn" id="draw" style="width: 600px;max-width: 600px;">字幕背景不透明度<input type="range" min="0" max="100" step="5" id="op" onchange="tmd()" value="80"></div>
                        </div>
                    </div>
                </div>
            </div>
    </div>
    <script src="ui/newui.js"></script>
    <script src="lookvideo.js"></script>
</body>
</html>
